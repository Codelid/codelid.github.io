<!DOCTYPE html>
<style> 
  div.sticky {
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    background-color: #666;
    padding: 40px;
  }
  #background {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:20%;
    background-color:black;
    color:grey;
  }
  #bottom {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:5%;
    background-color:#0c0c0c;
    border-radius:10px 10px 0px 0px;
    color:grey;
  }
  #bodyp {
    position:absolute;
    top:20%;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  } 
  #hudbar {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:10%;
    background-color:#ffffff50;
  }
  .container {
    position: relative;
    height: 400px;
    border: 2px solid #006100;
  }
  .centered-element {
    margin: 0;
    position: absolute;
    top: 50%;
    left:2%;
    transform: translateY(-50%);
  }
  .center-x {
    margin: 0;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .webpage {
    position:absolute;
    width:100%;
    height:1000%;
    background-color:#D9D9D9;
    
  }
  .topbar {
    background-color:#222222D9;
    color:white;
    width:100%;
    height:5%;
    position:fixed;
    top:0;
    left:0;
    border-radius:0px 0px 10px 10px ;
  }
  .sitename {
    margin: 0;
    color:white;
    position:absolute;
    top:25%;
    transform:translatey(-50);
    left:2%
  }
</style>
<html>
  <body>
    <div class="webpage">
      
    </div>
    <div id="background">
      <div class="centered-element center-x">
        <h1 style="color:grey;">
        Paiges Test Website
        </h1>
      </div>
    </div>
      <div id="bodyp">
        This is a example for me on what lookes good for a website
    </div>
    <div id="bottom">
      <div class="centered-element" style="">
        <a href="https://pagenotfound40.github.io/" style="color:white; text-decoration:none;">
        ©CodeLid
        </a>
      </div>
    </div>
    <div class="topbar">
      <div class="sitename">Paiges site
      </div>
    </div>
  </body>
</html>
